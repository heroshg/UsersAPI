# UsersAPI — manifests do ambiente dev (namespace fcg-dev, criado pela plataforma — Orchestration).
# Deploy: kubectl apply -f k8s-dev.yaml -n fcg-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: users-api-sa
  namespace: fcg-dev
  # Learner Lab: sem IRSA (enable_irsa=false) — pods herdam as permissões do node role (LabRole).
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: users-api-config
  namespace: fcg-dev
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  Jwt__Issuer: "FiapCloudGames"
  Jwt__Audience: "FiapCloudGames"
  Jwt__ExpirationMinutes: "15"
  AWS__Region: "us-east-1"
  Messaging__Scope: "fcg-dev"
---
# UsersAPI é o emissor dos JWTs: precisa da chave PRIVADA (as demais APIs só recebem a pública).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: users-api-secrets
  namespace: fcg-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: fcg-secretstore
    kind: ClusterSecretStore
  target:
    name: users-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: Jwt__RsaPrivateKey
      remoteRef:
        key: fcg/dev/common/jwt
        property: Jwt__RsaPrivateKey
    - secretKey: Jwt__RsaPublicKey
      remoteRef:
        key: fcg/dev/common/jwt
        property: Jwt__RsaPublicKey
    - secretKey: ConnectionStrings__Users
      remoteRef:
        key: fcg/dev/users/db
        property: ConnectionStrings__Users
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-api
  namespace: fcg-dev
  labels:
    app: users-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: users-api
  template:
    metadata:
      labels:
        app: users-api
    spec:
      serviceAccountName: users-api-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: users-api
          # Substituir 667079134782; CI/CD (spec 09) faz `kubectl set image` com a tag da build.
          image: 667079134782.dkr.ecr.us-east-1.amazonaws.com/users-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "750m"
          envFrom:
            - configMapRef:
                name: users-api-config
            - secretRef:
                name: users-api-secrets
            # ⚠️ Learner Lab: o SDK da AWS via IMDS (node role/LabRole) trava por causa do hop
            # limit de metadata dos nós (mesmo problema do ESO — ver Orchestration/k8s-dev.yaml).
            # Fallback: credenciais temporárias do lab como env vars. Secret populado
            # imperativamente, NUNCA commitado — recriar a cada sessão:
            # `kubectl create secret generic aws-lab-creds -n fcg-dev ...`.
            - secretRef:
                name: aws-lab-creds
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: users-api
  namespace: fcg-dev
  labels:
    app: users-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: users-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: users-api
  namespace: fcg-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: users-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-users-api-ingress
  namespace: fcg-dev
spec:
  podSelector:
    matchLabels:
      app: users-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
